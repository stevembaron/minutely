name = "soon-weather-proxy"
main = "src/index.ts"
compatibility_date = "2025-01-01"

# Set the Pirate Weather key as a secret (NOT a [vars] entry):
#   wrangler secret put PIRATE_API_KEY
#
# Optionally restrict which web origins can call the proxy. Leave unset
# to allow any origin (fine for personal projects, not for high-traffic
# public deployments).
# [vars]
# ALLOWED_ORIGINS = "https://stevembaron.github.io,https://your-custom-domain.com"
